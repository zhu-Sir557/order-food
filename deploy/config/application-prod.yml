server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/order_food?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: __DB_PASSWORD__
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.restaurant.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: __JWT_SECRET__
  expiration: 24

# OSS Configuration
aliyun:
  oss:
    endpoint: https://oss-cn-shanghai.aliyuncs.com
    access-key-id: __OSS_ACCESS_KEY_ID__
    access-key-secret: __OSS_ACCESS_KEY_SECRET__
    bucket-name: order-food-zjw
    url-prefix: https://order-food-zjw.oss-cn-shanghai.aliyuncs.com

# File Upload Configuration
file:
  allowed-types: image/jpeg,image/png,image/gif,image/webp

logging:
  level:
    com.restaurant: info
    com.baomidou: warn
  file:
    name: /opt/order-food/logs/app.log
