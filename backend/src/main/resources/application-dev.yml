server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/order_food?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.restaurant.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret:
  expiration: 24

file:
  allowed-types: image/jpeg,image/png,image/gif,image/webp

logging:
  level:
    com.restaurant: debug
    com.baomidou: debug

sms:
  rate-limit:
    code-ttl-seconds: 300
    interval-seconds: 60
    phone-daily-limit: 10
    ip-daily-limit: 50
    fail-max: 5
    lock-minutes: 10
aliyun:
  dypnsapi:
    endpoint: dypnsapi.aliyuncs.com
    sign-name: "恒创联众"
    template-code: "100001"
